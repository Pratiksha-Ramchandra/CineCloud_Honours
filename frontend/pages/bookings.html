<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - CineCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
    <div id="navbar"></div>
    
    <div class="container mx-auto px-4 py-8">
        <div id="content"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script>
        (async function(){
        if (!requireAuth()) return;
        
        const user = getUser();
        
        async function loadBookings() {
            const bookings = await api.getMyBookings();
            
            document.getElementById('navbar').innerHTML = Navbar(user, 'bookings');
            
            if (bookings.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-ticket-alt text-6xl text-gray-300 mb-4"></i>
                        <h2 class="text-2xl font-semibold text-gray-600">No Bookings Yet</h2>
                        <p class="text-gray-500 mt-2">Book your first movie ticket now!</p>
                        <a href="/movies" class="inline-block mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Browse Movies</a>
                    </div>
                `;
                return;
            }
            
            let bookingsHtml = '<h1 class="text-3xl font-bold mb-8">My Bookings</h1><div class="space-y-4">';
            
            bookings.forEach(booking => {
                bookingsHtml += `
                    <div class="booking-card bg-white rounded-xl shadow-sm overflow-hidden">
                        <div class="p-4">
                            <div class="flex flex-wrap justify-between items-start gap-4">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-3">
                                        <h3 class="text-xl font-bold">${booking.movie_title}</h3>
                                        <span class="px-2 py-1 text-xs rounded-full ${booking.status === 'confirmed' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                            ${booking.status.toUpperCase()}
                                        </span>
                                    </div>
                                    <div class="space-y-2 text-gray-600">
                                        <div><i class="fas fa-calendar w-5"></i> ${new Date(booking.show_date).toLocaleDateString()}</div>
                                        <div><i class="fas fa-clock w-5"></i> ${booking.show_time}</div>
                                        <div><i class="fas fa-building w-5"></i> ${booking.theater_name}</div>
                                        <div><i class="fas fa-ticket-alt w-5"></i> Seats: ${booking.seats.join(', ')}</div>
                                        <div><i class="fas fa-receipt w-5"></i> Booking ID: ${booking.bookingId || booking.booking_id}</div>
                                        <div><span class="font-semibold">Amount:</span> <span class="text-lg font-bold text-blue-600">₹${booking.totalAmount || booking.total_amount}</span></div>
                                    </div>
                                </div>
                                ${booking.status === 'confirmed' ? `
                                    <button onclick="cancelBooking('${booking.bookingId || booking.booking_id}')" class="text-red-600 hover:text-red-800">
                                        <i class="fas fa-times-circle text-2xl"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            bookingsHtml += '</div>';
            document.getElementById('content').innerHTML = bookingsHtml;
        }
        
        window.cancelBooking = async function(bookingId) {
            if (confirm('Are you sure you want to cancel this booking?')) {
                const result = await api.cancelBooking(bookingId);
                if (result.error) {
                    alert('Failed to cancel: ' + result.error);
                } else {
                    alert('Booking cancelled successfully');
                    loadBookings();
                }
            }
        }
        
        loadBookings();
        })();
    </script>
</body>
</html>

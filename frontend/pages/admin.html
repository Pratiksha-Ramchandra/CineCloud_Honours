<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CineCloud</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-gray-50">

    <div id="navbar"></div>

    <div class="container mx-auto px-4 py-8">
        <div id="content"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>

    <script>

        (async function () {

            if (!requireAdmin()) return;

            const user = getUser();

            function safeSetNavbar(user, active) {

                try {

                    document.getElementById('navbar').innerHTML =
                        Navbar(user, active);

                } catch (err) {

                    console.warn('Navbar render failed', err);

                    const el = document.getElementById('navbar');

                    if (el) el.innerHTML = '';
                }
            }

            // CLOUDINARY UPLOAD
            async function uploadToCloudinary(file, resourceType = 'image') {

                const reader = new FileReader();

                return new Promise((resolve, reject) => {

                    reader.onload = async () => {

                        try {

                            const base64 = reader.result.split(',')[1];

                            const response = await fetch(
                                `${API_URL}/movies/upload`,
                                {
                                    method: 'POST',

                                    headers: {
                                        'Content-Type': 'application/json',
                                        ...setAuthHeader()
                                    },

                                    body: JSON.stringify({
                                        file: `data:${file.type};base64,${base64}`,
                                        resourceType
                                    })
                                }
                            );

                            const result = await response.json();

                            if (result.error) {

                                reject(new Error(result.error));

                            } else {

                                resolve({
                                    secure_url: result.url,
                                    url: result.url
                                });
                            }

                        } catch (err) {

                            reject(err);
                        }
                    };

                    reader.onerror = () =>
                        reject(new Error('File read failed'));

                    reader.readAsDataURL(file);
                });
            }

            async function loadAdminDashboard() {

                try {

                    const stats = await api.getAdminStats();
                    const bookings = await api.getAllBookings();
                    const showtimes = await api.getAllShowtimes();
                    const movies = await api.getMovies();
                    const theaters = await api.getTheaters();

                    if (stats?.error) {

                        safeSetNavbar(user, 'admin');

                        document.getElementById('content').innerHTML = `
                            <div class="bg-red-50 border border-red-200 p-6 rounded">

                                <h2 class="text-lg font-semibold text-red-700">
                                    Unable to load admin data
                                </h2>

                                <p class="text-sm text-red-600 mt-2">
                                    ${stats.error}
                                </p>

                            </div>
                        `;

                        return;
                    }

                    safeSetNavbar(user, 'admin');

                    document.getElementById('content').innerHTML = `
                    
                        <h1 class="text-2xl font-bold mb-6">
                            Admin Dashboard
                        </h1>

                        <div id="adminSummary">

                            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">

                                <div class="bg-white rounded-xl p-6 shadow-sm">
                                    <div class="flex items-center justify-between">

                                        <div>
                                            <p class="text-gray-500 text-sm">
                                                Total Users
                                            </p>

                                            <p class="text-2xl font-bold">
                                                ${stats.totalUsers || 0}
                                            </p>
                                        </div>

                                        <i class="fas fa-users text-3xl text-blue-500"></i>

                                    </div>
                                </div>

                                <div class="bg-white rounded-xl p-6 shadow-sm">
                                    <div class="flex items-center justify-between">

                                        <div>
                                            <p class="text-gray-500 text-sm">
                                                Active Movies
                                            </p>

                                            <p class="text-2xl font-bold">
                                                ${stats.totalMovies || 0}
                                            </p>
                                        </div>

                                        <i class="fas fa-film text-3xl text-green-500"></i>

                                    </div>
                                </div>

                                <div class="bg-white rounded-xl p-6 shadow-sm">
                                    <div class="flex items-center justify-between">

                                        <div>
                                            <p class="text-gray-500 text-sm">
                                                Total Bookings
                                            </p>

                                            <p class="text-2xl font-bold">
                                                ${stats.totalBookings || 0}
                                            </p>
                                        </div>

                                        <i class="fas fa-ticket-alt text-3xl text-purple-500"></i>

                                    </div>
                                </div>

                                <div class="bg-white rounded-xl p-6 shadow-sm">
                                    <div class="flex items-center justify-between">

                                        <div>
                                            <p class="text-gray-500 text-sm">
                                                Total Revenue
                                            </p>

                                            <p class="text-2xl font-bold">
                                                ₹${stats.totalRevenue || 0}
                                            </p>
                                        </div>

                                        <i class="fas fa-rupee-sign text-3xl text-orange-500"></i>

                                    </div>
                                </div>

                            </div>

                        </div>

                        <div class="bg-white rounded-xl shadow-sm p-6">

                            <h3 class="font-semibold mb-4">
                                Showtimes
                            </h3>

                            <div class="overflow-x-auto mb-6">

                                <table class="w-full">

                                    <thead class="bg-gray-50">

                                        <tr>

                                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">
                                                Theater
                                            </th>

                                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">
                                                Actions
                                            </th>

                                        </tr>

                                    </thead>

                                    <tbody id="showtimesTable"></tbody>

                                </table>

                            </div>

                        </div>

                        <div class="bg-white rounded-xl shadow-sm p-6 mt-6">

                            <h3 class="font-semibold mb-4">
                                Manage Movies
                            </h3>

                            <form id="movieForm" class="space-y-4 max-w-2xl">

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        Title
                                    </label>

                                    <input
                                        type="text"
                                        id="movieTitle"
                                        required
                                        class="w-full px-4 py-2 border rounded-lg"
                                    >
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        Description
                                    </label>

                                    <textarea
                                        id="movieDescription"
                                        class="w-full px-4 py-2 border rounded-lg"
                                    ></textarea>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">
                                            Release Date
                                        </label>

                                        <input
                                            type="date"
                                            id="movieReleaseDate"
                                            class="w-full px-4 py-2 border rounded-lg"
                                        >
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">
                                            Duration (min)
                                        </label>

                                        <input
                                            type="number"
                                            id="movieDuration"
                                            class="w-full px-4 py-2 border rounded-lg"
                                        >
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">
                                            Genre
                                        </label>

                                        <input
                                            type="text"
                                            id="movieGenre"
                                            class="w-full px-4 py-2 border rounded-lg"
                                        >
                                    </div>

                                </div>

                                <div>

                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        Poster (image)
                                    </label>

                                    <input
                                        type="file"
                                        id="posterFile"
                                        accept="image/*"
                                        class="mb-2"
                                    >

                                    <input
                                        type="url"
                                        id="moviePosterUrl"
                                        placeholder="Or paste Cloudinary image URL"
                                        class="w-full px-4 py-2 border rounded-lg"
                                    >

                                    <div id="posterStatus" class="text-sm text-green-600"></div>

                                </div>

                                <div>

                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        Trailer (video)
                                    </label>

                                    <input
                                        type="file"
                                        id="trailerFile"
                                        accept="video/*"
                                        class="mb-2"
                                    >

                                    <input
                                        type="url"
                                        id="movieTrailerUrl"
                                        placeholder="Or paste Cloudinary video URL"
                                        class="w-full px-4 py-2 border rounded-lg"
                                    >

                                    <div id="trailerStatus" class="text-sm text-green-600"></div>

                                </div>

                                <div>

                                    <button
                                        type="submit"
                                        class="bg-blue-600 text-white px-4 py-2 rounded"
                                    >
                                        Create Movie
                                    </button>

                                </div>

                            </form>

                        </div>
                    `;

                    // SHOWTIMES TABLE

                    const tableBody =
                        document.getElementById('showtimesTable');

                    const theaterMap = {};

                    (showtimes || []).forEach(showtime => {

                        const tId =
                            showtime.theater_id ||
                            showtime.theaterId;

                        if (!theaterMap[tId]) {

                            theaterMap[tId] = {
                                name: showtime.theater_name,
                                showtimes: []
                            };
                        }

                        theaterMap[tId].showtimes.push(showtime);
                    });

                    Object.keys(theaterMap).forEach(tid => {

                        const t = theaterMap[tid];

                        const defaultShowtimeId =
                            t.showtimes[0]
                                ? t.showtimes[0].id
                                : '';

                        tableBody.innerHTML += `
                        
                            <tr class="border-b">

                                <td class="px-4 py-3 text-sm">
                                    ${t.name}
                                </td>

                                <td class="px-4 py-3 text-sm">

                                    <select class="showtime-select border rounded px-2 py-1 mr-2">

                                        ${t.showtimes.map(st => `
                                        
                                            <option value="${st.id}">
                                                ${new Date(
                                                    st.show_date || st.showDate
                                                ).toLocaleDateString()}
                                                ${st.show_time || st.showTime}
                                            </option>

                                        `).join('')}

                                    </select>

                                    <button
                                        type="button"
                                        class="showtime-free text-red-600 hover:text-red-800"
                                        data-id="${defaultShowtimeId}"
                                    >
                                        Free Seats
                                    </button>

                                </td>

                            </tr>
                        `;
                    });

                    // FREE SEATS

                    document.querySelectorAll('.showtime-select')
                        .forEach(select => {

                            select.addEventListener('change', (e) => {

                                const row =
                                    e.target.closest('tr');

                                const btn =
                                    row.querySelector('.showtime-free');

                                if (btn) {

                                    btn.setAttribute(
                                        'data-id',
                                        e.target.value
                                    );
                                }
                            });
                        });

                    document.querySelectorAll('.showtime-free')
                        .forEach(btn => {

                            btn.addEventListener('click', async () => {

                                const id =
                                    btn.getAttribute('data-id');

                                if (!id) {

                                    alert('No showtime selected');

                                    return;
                                }

                                if (!confirm(
                                    'Free all seats for this showtime?'
                                )) return;

                                const res =
                                    await api.freeShowtime(id);

                                if (res.error) {

                                    alert(
                                        'Failed to free seats: ' +
                                        res.error
                                    );

                                } else {

                                    alert(
                                        'Seats freed successfully'
                                    );

                                    loadAdminDashboard();
                                }
                            });
                        });

                    // MOVIE FORM HANDLER

                    const movieForm =
                        document.getElementById('movieForm');

                    const posterFileInput =
                        document.getElementById('posterFile');

                    const trailerFileInput =
                        document.getElementById('trailerFile');

                    const posterStatus =
                        document.getElementById('posterStatus');

                    const trailerStatus =
                        document.getElementById('trailerStatus');

                    movieForm.addEventListener(
                        'submit',
                        async (e) => {

                            e.preventDefault();

                            try {

                                const title =
                                    document.getElementById(
                                        'movieTitle'
                                    ).value.trim();

                                const description =
                                    document.getElementById(
                                        'movieDescription'
                                    ).value;

                                const release_date =
                                    document.getElementById(
                                        'movieReleaseDate'
                                    ).value;

                                const duration =
                                    document.getElementById(
                                        'movieDuration'
                                    ).value;

                                const genre =
                                    document.getElementById(
                                        'movieGenre'
                                    ).value;

                                let poster_url =
                                    document.getElementById(
                                        'moviePosterUrl'
                                    ).value.trim();

                                let trailer_url =
                                    document.getElementById(
                                        'movieTrailerUrl'
                                    ).value.trim();

                                if (!title) {

                                    alert('Title is required');

                                    return;
                                }

                                // POSTER

                                if (
                                    posterFileInput.files &&
                                    posterFileInput.files[0]
                                ) {

                                    posterStatus.textContent =
                                        'Uploading poster...';

                                    const resp =
                                        await uploadToCloudinary(
                                            posterFileInput.files[0],
                                            'image'
                                        );

                                    poster_url =
                                        resp.secure_url ||
                                        resp.url;

                                    posterStatus.textContent =
                                        'Poster uploaded';
                                }

                                // TRAILER

                                if (
                                    trailerFileInput.files &&
                                    trailerFileInput.files[0]
                                ) {

                                    trailerStatus.textContent =
                                        'Uploading trailer...';

                                    const resp =
                                        await uploadToCloudinary(
                                            trailerFileInput.files[0],
                                            'video'
                                        );

                                    trailer_url =
                                        resp.secure_url ||
                                        resp.url;

                                    trailerStatus.textContent =
                                        'Trailer uploaded';
                                }

                                const payload = {
                                    title,
                                    description,
                                    release_date,
                                    duration,
                                    genre,
                                    poster_url,
                                    trailer_url
                                };

                                console.log(
                                    'Movie Payload:',
                                    payload
                                );

                                const result =
                                    await api.createMovie(payload);

                                console.log(result);

                                if (result.error) {

                                    alert(
                                        'Failed to create movie:\n' +
                                        result.error
                                    );

                                } else {

                                    alert(
                                        'Movie created successfully'
                                    );

                                    movieForm.reset();

                                    posterStatus.textContent = '';

                                    trailerStatus.textContent = '';

                                    loadAdminDashboard();
                                }

                            } catch (err) {

                                console.error(
                                    'Movie creation failed',
                                    err
                                );

                                alert(
                                    'Movie creation failed: ' +
                                    err.message
                                );
                            }
                        }
                    );

                } catch (err) {

                    console.error('Admin dashboard error', err);

                    safeSetNavbar(user, 'admin');

                    document.getElementById('content').innerHTML = `
                    
                        <div class="bg-red-50 border border-red-200 p-6 rounded">

                            <h2 class="text-lg font-semibold text-red-700">
                                Failed to load dashboard
                            </h2>

                            <p class="text-sm text-red-600 mt-2">
                                ${err.message || 'Unknown error'}
                            </p>

                        </div>
                    `;
                }
            }

            loadAdminDashboard();

        })();

    </script>

</body>
</html>

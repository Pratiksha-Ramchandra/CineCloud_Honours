<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CineCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
    <div id="navbar"></div>
    
    <div class="container mx-auto px-4 py-8">
        <div id="content"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script>
        (async function(){
        if (!requireAdmin()) return;
        
        const user = getUser();

        function safeSetNavbar(user, active) {
            try {
                document.getElementById('navbar').innerHTML = Navbar(user, active);
            } catch (err) {
                console.warn('Navbar render failed', err);
                const el = document.getElementById('navbar');
                if (el) el.innerHTML = '';
            }
        }
        let statsChart = null;
        
        async function loadAdminDashboard() {
            try {
                const stats = await api.getAdminStats();
                const bookings = await api.getAllBookings();
                const showtimes = await api.getAllShowtimes();
                const movies = await api.getMovies();
                const theaters = await api.getTheaters();

                if (stats?.error) {
                    safeSetNavbar(user, 'admin');
                    document.getElementById('content').innerHTML = `<div class="bg-red-50 border border-red-200 p-6 rounded">` +
                        `<h2 class="text-lg font-semibold text-red-700">Unable to load admin data</h2>` +
                        `<p class="text-sm text-red-600 mt-2">${stats.error}</p></div>`;
                    return;
                }

                safeSetNavbar(user, 'admin');

                document.getElementById('content').innerHTML = `
                    <h1 class="text-2xl font-bold mb-6">Admin Dashboard</h1>
                    <div id="adminSummary">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                            <div class="bg-white rounded-xl p-6 shadow-sm">
                                <div class="flex items-center justify-between">
                                    <div><p class="text-gray-500 text-sm">Total Users</p><p class="text-2xl font-bold">${stats.totalUsers || 0}</p></div>
                                    <i class="fas fa-users text-3xl text-blue-500"></i>
                                </div>
                            </div>
                            <div class="bg-white rounded-xl p-6 shadow-sm">
                                <div class="flex items-center justify-between">
                                    <div><p class="text-gray-500 text-sm">Active Movies</p><p class="text-2xl font-bold">${stats.totalMovies || 0}</p></div>
                                    <i class="fas fa-film text-3xl text-green-500"></i>
                                </div>
                            </div>
                            <div class="bg-white rounded-xl p-6 shadow-sm">
                                <div class="flex items-center justify-between">
                                    <div><p class="text-gray-500 text-sm">Total Bookings</p><p class="text-2xl font-bold">${stats.totalBookings || 0}</p></div>
                                    <i class="fas fa-ticket-alt text-3xl text-purple-500"></i>
                                </div>
                            </div>
                            <div class="bg-white rounded-xl p-6 shadow-sm">
                                <div class="flex items-center justify-between">
                                    <div><p class="text-gray-500 text-sm">Total Revenue</p><p class="text-2xl font-bold">₹${stats.totalRevenue || 0}</p></div>
                                    <i class="fas fa-rupee-sign text-3xl text-orange-500"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        <div class="bg-white rounded-xl shadow-sm p-6">
                            <h3 class="font-semibold mb-4">Booking Analytics</h3>
                            <canvas id="statsChart" height="200"></canvas>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm p-6">
                            <h3 class="font-semibold mb-4">Recent Bookings</h3>
                            <div class="space-y-3 max-h-80 overflow-y-auto" id="recentBookings"></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <h3 class="font-semibold mb-4">Manage Showtimes</h3>
                        <div class="overflow-x-auto mb-6">
                            <table class="w-full">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Movie</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Theater</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Date</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Time</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Price</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Available</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="showtimesTable"></tbody>
                            </table>
                        </div>
                        <div class="border border-gray-200 rounded-xl p-6 bg-gray-50">
                            <h4 class="font-semibold mb-4">Add Showtime</h4>
                            <form id="showtimeForm" class="space-y-4">
                                <input type="hidden" id="showtimeId">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Movie</label>
                                        <select id="showtimeMovie" class="w-full px-4 py-2 border rounded-lg"></select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Theater</label>
                                        <select id="showtimeTheater" class="w-full px-4 py-2 border rounded-lg"></select>
                                    </div>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                                        <input type="date" id="showtimeDate" class="w-full px-4 py-2 border rounded-lg">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Time</label>
                                        <input type="time" id="showtimeTime" class="w-full px-4 py-2 border rounded-lg">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Price</label>
                                        <input type="number" id="showtimePrice" class="w-full px-4 py-2 border rounded-lg" min="0">
                                    </div>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Total Seats</label>
                                        <input type="number" id="showtimeSeats" class="w-full px-4 py-2 border rounded-lg" min="1">
                                    </div>
                                    <div class="flex items-end gap-3">
                                        <button type="submit" id="showtimeSaveButton" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Save Showtime</button>
                                        <button type="button" id="showtimeCancelButton" class="hidden bg-gray-300 text-gray-700 px-4 py-2 rounded-lg">Cancel</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6 mt-6">
                        <h3 class="font-semibold mb-4">Manage Movies</h3>
                        <form id="movieForm" class="space-y-4 max-w-2xl">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                                <input type="text" id="movieTitle" required class="w-full px-4 py-2 border rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                                <textarea id="movieDescription" class="w-full px-4 py-2 border rounded-lg"></textarea>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Release Date</label>
                                    <input type="date" id="movieReleaseDate" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Duration (min)</label>
                                    <input type="number" id="movieDuration" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Genre</label>
                                    <input type="text" id="movieGenre" class="w-full px-4 py-2 border rounded-lg">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Poster (image)</label>
                                <input type="file" id="posterFile" accept="image/*" class="mb-2">
                                <input type="url" id="moviePosterUrl" placeholder="Or paste Cloudinary image URL" class="w-full px-4 py-2 border rounded-lg">
                                <div id="posterStatus" class="text-sm text-green-600"></div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Trailer (video)</label>
                                <input type="file" id="trailerFile" accept="video/*" class="mb-2">
                                <input type="url" id="movieTrailerUrl" placeholder="Or paste Cloudinary video URL" class="w-full px-4 py-2 border rounded-lg">
                                <div id="trailerStatus" class="text-sm text-green-600"></div>
                            </div>
                            <div>
                                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Create Movie</button>
                            </div>
                        </form>
                    </div>
                `;

                // Create chart (safe fallback)
                try {
                    const ctx = document.getElementById('statsChart').getContext('2d');
                    if (window.Chart) {
                        statsChart = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                                datasets: [{
                                    label: 'Bookings',
                                    data: [45, 52, 38, 67, 89, 124, 98],
                                    backgroundColor: '#3b82f6'
                                }]
                            }
                        });
                    }
                } catch (e) {
                    console.warn('Chart init failed', e);
                }

                // Recent bookings (guarded)
                const recentDiv = document.getElementById('recentBookings');
                const recent = stats.recentBookings || (bookings || []).slice(0, 10);
                if (Array.isArray(recent)) {
                    recent.slice(0, 10).forEach(booking => {
                        recentDiv.innerHTML += `
                            <div class="flex justify-between items-center p-2 border-b">
                                <div>
                                    <p class="font-medium text-sm">${booking.movie_title}</p>
                                    <p class="text-xs text-gray-500">${booking.user_name} • ${new Date(booking.booking_date || booking.bookingDate).toLocaleDateString()}</p>
                                </div>
                                <span class="font-semibold">₹${booking.total_amount || booking.totalAmount}</span>
                            </div>
                        `;
                    });
                }

                // Showtimes table
                const tableBody = document.getElementById('showtimesTable');
                (showtimes || []).forEach(showtime => {
                    tableBody.innerHTML += `
                        <tr class="border-b">
                            <td class="px-4 py-3 text-sm">${showtime.movie_title}</td>
                            <td class="px-4 py-3 text-sm">${showtime.theater_name}</td>
                            <td class="px-4 py-3 text-sm">${new Date(showtime.show_date || showtime.showDate).toLocaleDateString()}</td>
                            <td class="px-4 py-3 text-sm">${showtime.show_time || showtime.showTime}</td>
                            <td class="px-4 py-3 text-sm">₹${showtime.price}</td>
                            <td class="px-4 py-3 text-sm">${showtime.available_seats || showtime.availableSeats}/${showtime.total_seats || showtime.totalSeats}</td>
                            <td class="px-4 py-3 text-sm">
                                <button type="button" class="showtime-edit text-blue-600 hover:text-blue-800" data-id="${showtime.id}">Edit</button>
                                <button type="button" class="showtime-free text-red-600 hover:text-red-800 ml-3" data-id="${showtime.id}">Free Seats</button>
                            </td>
                        </tr>
                    `;
                });

                // Attach action handlers for Edit and Free
                document.querySelectorAll('.showtime-edit').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.getAttribute('data-id');
                        if (typeof window.editShowtime === 'function') {
                            window.editShowtime(id);
                        }
                    });
                });

                document.querySelectorAll('.showtime-free').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-id');
                        if (!confirm('Free all seats for this showtime? This will cancel all confirmed bookings.')) return;
                        const res = await api.freeShowtime(id);
                        if (res.error) {
                            alert('Failed to free seats: ' + res.error);
                        } else {
                            alert('Seats freed. Cancelled bookings: ' + (res.cancelledBookings || 0));
                            loadAdminDashboard();
                        }
                    });
                });

                const movieSelect = document.getElementById('showtimeMovie');
                const theaterSelect = document.getElementById('showtimeTheater');
                if (movieSelect && theaterSelect) {
                    movieSelect.innerHTML = '<option value="">Select movie</option>' +
                        (movies || []).map(movie => `<option value="${movie.id}">${movie.title}</option>`).join('');
                    theaterSelect.innerHTML = '<option value="">Select theater</option>' +
                        (theaters || []).map(theater => `<option value="${theater.id}">${theater.name} - ${theater.location || ''}</option>`).join('');

                    const showtimeIdInput = document.getElementById('showtimeId');
                    const showtimeSaveButton = document.getElementById('showtimeSaveButton');
                    const showtimeCancelButton = document.getElementById('showtimeCancelButton');
                    const showtimeForm = document.getElementById('showtimeForm');

                    function resetShowtimeForm() {
                        showtimeIdInput.value = '';
                        showtimeForm.reset();
                        showtimeSaveButton.textContent = 'Save Showtime';
                        showtimeCancelButton.classList.add('hidden');
                    }

                    window.editShowtime = function(showtimeId) {
                        const showtime = (showtimes || []).find(s => s.id === showtimeId);
                        if (!showtime) return;
                        showtimeIdInput.value = showtime.id;
                        document.getElementById('showtimeMovie').value = showtime.movie_id || '';
                        document.getElementById('showtimeTheater').value = showtime.theater_id || '';
                        document.getElementById('showtimeDate').value = new Date(showtime.show_date || showtime.showDate).toISOString().slice(0, 10);
                        document.getElementById('showtimeTime').value = showtime.show_time || showtime.showTime;
                        document.getElementById('showtimePrice').value = showtime.price;
                        document.getElementById('showtimeSeats').value = showtime.total_seats || showtime.totalSeats;
                        showtimeSaveButton.textContent = 'Update Showtime';
                        showtimeCancelButton.classList.remove('hidden');
                    };

                    showtimeCancelButton.addEventListener('click', (e) => {
                        e.preventDefault();
                        resetShowtimeForm();
                    });

                    showtimeForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const showtimeId = showtimeIdInput.value;
                        const movieId = document.getElementById('showtimeMovie').value;
                        const theaterId = document.getElementById('showtimeTheater').value;
                        const showDate = document.getElementById('showtimeDate').value;
                        const showTime = document.getElementById('showtimeTime').value;
                        const price = document.getElementById('showtimePrice').value;
                        const totalSeats = document.getElementById('showtimeSeats').value;

                        if (!movieId || !theaterId || !showDate || !showTime || !price || !totalSeats) {
                            alert('Please fill all showtime fields.');
                            return;
                        }

                        const payload = {
                            movie_id: movieId,
                            theater_id: theaterId,
                            show_date: showDate,
                            show_time: showTime,
                            price: Number(price),
                            total_seats: Number(totalSeats)
                        };

                        let result;
                        if (showtimeId) {
                            result = await api.updateShowtime(showtimeId, payload);
                        } else {
                            result = await api.createShowtime(payload);
                        }

                        if (result.error) {
                            alert((showtimeId ? 'Could not update showtime: ' : 'Could not add showtime: ') + result.error);
                        } else {
                            alert(showtimeId ? 'Showtime updated successfully' : 'Showtime added successfully');
                            resetShowtimeForm();
                            loadAdminDashboard();
                        }
                    });
                }
            } catch (err) {
                console.error('Admin dashboard error', err);
                safeSetNavbar(user, 'admin');
                document.getElementById('content').innerHTML = `<div class="bg-red-50 border border-red-200 p-6 rounded"><h2 class="text-lg font-semibold text-red-700">Failed to load dashboard</h2><p class="text-sm text-red-600 mt-2">${err.message || 'Unknown error'}</p></div>`;
            }
        }

                // Cloudinary upload via backend API
                async function uploadToCloudinary(file, resourceType = 'image') {
                    // Convert file to base64
                    const reader = new FileReader();
                    return new Promise((resolve, reject) => {
                        reader.onload = async () => {
                            try {
                                const base64 = reader.result.split(',')[1];
                                const response = await fetch(`${API_URL}/movies/upload`, {
                                    method: 'POST',
                                    headers: setAuthHeader(),
                                    body: JSON.stringify({
                                        file: `data:${file.type};base64,${base64}`,
                                        resourceType
                                    })
                                });
                                const result = await response.json();
                                if (result.error) {
                                    reject(new Error(result.error));
                                } else {
                                    resolve({ secure_url: result.url, url: result.url });
                                }
                            } catch (err) {
                                reject(err);
                            }
                        };
                        reader.onerror = () => reject(new Error('File read failed'));
                        reader.readAsDataURL(file);
                    });
                }

                // Movie form handling
                const movieForm = document.getElementById('movieForm');
                if (movieForm) {
                    const posterFileInput = document.getElementById('posterFile');
                    const trailerFileInput = document.getElementById('trailerFile');
                    const posterStatus = document.getElementById('posterStatus');
                    const trailerStatus = document.getElementById('trailerStatus');

                    movieForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        try {
                            const title = document.getElementById('movieTitle').value;
                            const description = document.getElementById('movieDescription').value;
                            const release_date = document.getElementById('movieReleaseDate').value;
                            const duration = document.getElementById('movieDuration').value;
                            const genre = document.getElementById('movieGenre').value;
                            const posterUrlText = document.getElementById('moviePosterUrl').value.trim();
                            const trailerUrlText = document.getElementById('movieTrailerUrl').value.trim();

                            let poster_url = posterUrlText || null;
                            let trailer_url = trailerUrlText || null;

                            if (posterFileInput.files && posterFileInput.files[0]) {
                                posterStatus.textContent = 'Uploading poster...';
                                const resp = await uploadToCloudinary(posterFileInput.files[0], 'image');
                                poster_url = resp.secure_url || resp.url || poster_url;
                                posterStatus.textContent = poster_url ? 'Poster uploaded' : 'Poster upload failed';
                            }

                            if (trailerFileInput.files && trailerFileInput.files[0]) {
                                trailerStatus.textContent = 'Uploading trailer...';
                                const resp = await uploadToCloudinary(trailerFileInput.files[0], 'video');
                                trailer_url = resp.secure_url || resp.url || trailer_url;
                                trailerStatus.textContent = trailer_url ? 'Trailer uploaded' : 'Trailer upload failed';
                            }

                            const payload = { title, description, release_date, duration, genre, poster_url, trailer_url };
                            const result = await api.createMovie(payload);
                            if (result.error) {
                                alert('Failed to create movie: ' + result.error);
                            } else {
                                alert('Movie created successfully');
                                // reset form
                                movieForm.reset();
                                posterStatus.textContent = '';
                                trailerStatus.textContent = '';
                                // refresh dashboard
                                loadAdminDashboard();
                            }
                        } catch (err) {
                            console.error('Movie creation failed', err);
                            alert('Movie creation failed: ' + (err.message || err));
                        }
                    });
                }

                loadAdminDashboard();
        })();
    </script>
</body>
</html>
